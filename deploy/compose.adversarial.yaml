# Overlay for DNS-02 adversarial runs.
# Usage:
#   MITM_MODE=additional-glue docker compose -f deploy/compose.yaml -f deploy/compose.adversarial.yaml up -d
#
# Smoke stays on compose.yaml alone (direct to auth). Do not merge this overlay into make smoke.

services:
  mitm:
    image: python:3.12-alpine
    working_dir: /app
    command:
      - python
      - /app/dns_mitm.py
      - --listen
      - 0.0.0.0
      - --port
      - "53"
      - --upstream
      - 172.30.0.10
      - --mode
      - ${MITM_MODE:-passthrough}
    volumes:
      - ./mitm:/app:ro
    depends_on:
      - auth
    networks:
      dnsnet:
        ipv4_address: 172.30.0.11
    cap_add:
      - NET_BIND_SERVICE

  unbound:
    volumes: !override
      - ./resolvers/unbound/unbound-via-mitm.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    depends_on:
      - auth
      - mitm

  dnsmasq:
    volumes: !override
      - ./resolvers/dnsmasq/dnsmasq-via-mitm.conf:/etc/dnsmasq.conf:ro
    depends_on:
      - auth
      - mitm
