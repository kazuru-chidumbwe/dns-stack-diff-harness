services:
  auth:
    image: coredns/coredns:1.11.3
    command: ["-conf", "/Corefile"]
    volumes:
      - ./coredns/Corefile:/Corefile:ro
      - ./coredns/zones:/zones:ro
    networks:
      dnsnet:
        ipv4_address: 172.30.0.10

  unbound:
    image: mvance/unbound:1.20.0
    volumes:
      - ./resolvers/unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    depends_on:
      - auth
    networks:
      dnsnet:
        ipv4_address: 172.30.0.20
    ports:
      - "9053:53/udp"
      - "9053:53/tcp"

  # alpine-based dnsmasq — strm/dnsmasq timed out on host-published 9054 in lab
  dnsmasq:
    image: alpine:3.20
    user: "0:0"
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache dnsmasq >/dev/null
        exec dnsmasq -k --conf-file=/etc/dnsmasq.conf
    volumes:
      - ./resolvers/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
    depends_on:
      - auth
    networks:
      dnsnet:
        ipv4_address: 172.30.0.30
    ports:
      - "9054:53/udp"
      - "9054:53/tcp"
    cap_add:
      - NET_BIND_SERVICE


networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
