server:
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    access-control: 0.0.0.0/0 allow
    username: ""
    domain-insecure: "lab.stackdiff."
    cache-min-ttl: 0
    cache-max-ttl: 60
    prefetch: no

forward-zone:
    name: "."
    # DNS-02: path goes through MITM (172.30.0.11) then auth.
    forward-addr: 172.30.0.11

remote-control:
    control-enable: no
