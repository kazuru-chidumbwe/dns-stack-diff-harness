server:
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    access-control: 0.0.0.0/0 allow
    username: ""
    # Deterministic smoke: do not DNSSEC-validate the lab zone.
    domain-insecure: "lab.stackdiff."
    # Reduce cache-induced timing variance for short smoke runs.
    cache-min-ttl: 0
    cache-max-ttl: 60
    prefetch: no

forward-zone:
    name: "."
    forward-addr: 172.30.0.10

remote-control:
    control-enable: no
