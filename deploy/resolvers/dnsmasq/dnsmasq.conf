no-resolv
no-hosts
keep-in-foreground
log-queries
log-facility=-
# Single controlled upstream — same auth as Unbound (deterministic smoke).
server=172.30.0.10
# Bind the container eth0 address explicitly (0.0.0.0 listen-address is unreliable).
interface=eth0
bind-interfaces
# Stay root in the container so privilege drop does not break the bind path.
user=root
group=root
# DNSSEC validation is off unless --dnssec is set (we do not set it).
# Disable cache for smoke determinism (RCODE+RRset gate, not timing).
cache-size=0
